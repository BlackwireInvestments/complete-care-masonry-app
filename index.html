<style>
:root{--slate:#0d0d0d;--slate2:#1f1f1f;--bg:#eef0f2;--card:#fff;--line:#e0e3e7;--line2:#cdd2d8;
 --txt:#15171a;--mut:#6b7178;--mut2:#9aa0a6;--accent:#e85a00;--green:#1aa863;--greenbg:#e4f6ec;--amber:#e0871f;--red:#df4b3a;--redbg:#fbe6e3;
 --rad:14px;--sh:0 2px 10px rgba(20,33,46,.06)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{max-width:540px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
.muted{color:var(--mut)}.tiny{font-size:12px}
.appbar{background:var(--slate);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:20}
.wm{font-family:'Oswald','Inter',sans-serif;font-weight:700;font-size:18px;letter-spacing:.03em;text-transform:uppercase}.wm .o{color:var(--accent)}
.appbar .sp{flex:1}
.chip{font-size:11px;font-weight:700;padding:5px 9px;border-radius:99px;background:#2a2a2a;color:#fff}
.chip.live{background:var(--green)}
.rolepill{display:flex;align-items:center;gap:7px;background:var(--slate2);border-radius:99px;padding:6px 10px 6px 7px;font-size:12px;font-weight:600}
.rolepill .av{width:24px;height:24px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:11px;font-weight:700}
.netbar{background:#3a2a12;color:#ffd9a0;font-size:12px;font-weight:600;text-align:center;padding:6px 10px;flex-shrink:0;display:none}
.netbar.on{display:block}
.screen{flex:1;overflow-y:auto;padding:14px 14px 90px;-webkit-overflow-scrolling:touch}
.h1{font-size:22px;font-weight:800;letter-spacing:-.02em}.sub{color:var(--mut);font-size:13px;margin-bottom:14px}
.row{display:flex;align-items:center;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--sh);margin-bottom:12px;padding:15px}
.card.tap{cursor:pointer}.card.tap:active{transform:scale(.997)}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase}
.b-active{background:var(--greenbg);color:#137a47}.b-soon{background:#e8eef5;color:#3a566f}
.prog{height:8px;background:#eef1f4;border-radius:99px;overflow:hidden;margin:11px 0 8px}.prog i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:.4s}
.jt{font-size:17px;font-weight:700}.jad{color:var(--mut);font-size:13px;margin-top:2px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:12px;font-weight:700;font-size:15px;background:var(--slate);color:#fff;transition:.15s}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.btn.acc{background:var(--accent)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.ghost{background:#fff;color:var(--txt);border:1.5px solid var(--line2)}
.btn.sm{padding:10px 14px;font-size:13px;width:auto}
.fab{position:absolute;right:16px;bottom:78px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;display:grid;place-items:center;box-shadow:0 6px 20px rgba(232,90,0,.4);z-index:25}
.nav{position:absolute;left:0;right:0;bottom:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:flex;z-index:24;max-width:540px;margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--mut2);font-size:10.5px;font-weight:600;position:relative}
.nav button.on{color:var(--accent)}.nav .ic{font-size:22px;line-height:1}
.navdot{position:absolute;top:7px;right:50%;margin-right:-15px;width:9px;height:9px;border-radius:50%;background:var(--red);border:1.5px solid #fff}
.notifbar{background:#10243a;color:#cfe3ff;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;padding:7px 10px;flex-shrink:0}
.notifbar.on{display:flex}.notifbar span{flex:1;cursor:pointer}.notifbar button{color:#7fa8cf;font-size:15px;padding:0 4px}
.step{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start}
.step.done{background:#f6faf7;border-color:#cfe9da}
.chk{width:28px;height:28px;border-radius:8px;border:2px solid var(--line2);flex:0 0 28px;display:grid;place-items:center;font-size:16px;color:#fff;cursor:pointer}
.step.done .chk{background:var(--green);border-color:var(--green)}
.step .tx{font-size:15px;font-weight:500;line-height:1.35}.step.done .tx{color:var(--mut);text-decoration:line-through}
.step .meta{font-size:11.5px;color:var(--mut);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.reqp{font-size:10px;font-weight:700;color:var(--accent);background:#fbe6db;padding:2px 7px;border-radius:6px}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);margin-top:8px}
.stepacts{margin-top:8px;display:flex;gap:14px;align-items:center}
.stepacts button{font-size:12px;font-weight:700}
.msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.4;margin-bottom:9px}
.msg .who{font-size:11px;font-weight:700;margin-bottom:2px;color:var(--accent)}
.msg.me{background:var(--slate);color:#fff;margin-left:auto;border-bottom-right-radius:4px}.msg.me .who{color:#f4a06a}
.msg.them{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg .tm{font-size:10px;color:var(--mut2);margin-top:3px}.msg.pending{opacity:.55}
.chatbar{position:absolute;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));max-width:540px;margin:0 auto;display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--line)}
.chatbar input{flex:1;border:1px solid var(--line2);border-radius:22px;padding:11px 15px}
.chatbar button{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;flex:0 0 44px}
.member{display:flex;align-items:center;gap:12px;padding:13px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:9px}
.member.tap{cursor:pointer}.member .av{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;flex:1}.stat .n{font-size:26px;font-weight:800}.stat .l{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;margin-top:2px}
.empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px}
.field{margin:12px 0}.field label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line2);border-radius:11px;padding:13px}
.sheet{position:fixed;inset:0;background:rgba(13,13,13,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
.sheet.on{display:flex}
.sheetcard{background:#fff;width:100%;max-width:540px;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.sheetcard h3{font-size:19px;font-weight:800;margin-bottom:4px}
#login{position:fixed;inset:0;background:#080808;color:#fff;z-index:80;display:none;flex-direction:column;justify-content:center;padding:30px 24px calc(30px + env(safe-area-inset-bottom));max-width:540px;margin:0 auto;overflow-y:auto}
#login.on{display:flex}
#login .lwm{font-family:'Oswald','Inter',sans-serif;font-weight:700;font-size:32px;letter-spacing:.04em;text-transform:uppercase;text-align:center}.lwm .o{color:var(--accent)}
#login .ltag{text-align:center;color:#9aa0a6;font-size:13px;margin:6px 0 26px}
#login .field input{background:#151515;border:1.5px solid #2a2a2a;color:#fff}
#login .note{text-align:center;color:#6a6a6a;font-size:12px;margin-top:18px;line-height:1.5}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:#15171a;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.22s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.toast.on{opacity:1}.toast.err{background:var(--red)}.toast.ok{background:var(--green)}
.seg{display:flex;background:#e3e6ea;border-radius:10px;padding:3px;margin-bottom:14px}
.seg button{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:700;color:var(--mut)}
.seg button.on{background:#fff;color:var(--txt);box-shadow:var(--sh)}
.shift{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f2f4;font-size:13px}
.shift:last-child{border-bottom:none}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow{text-align:center;font-size:10px;font-weight:700;color:var(--mut2);padding:2px 0}
.calday{position:relative;aspect-ratio:1;border-radius:9px;display:flex;align-items:flex-start;justify-content:flex-start;padding:5px 0 0 6px;font-size:13px;font-weight:600;background:#fff;border:1px solid var(--line);cursor:pointer}
.calday.today{border-color:var(--accent);color:var(--accent)}
.calday.sel{background:var(--slate);color:#fff;border-color:var(--slate)}
.caldots{position:absolute;bottom:5px;left:0;right:0;display:flex;gap:2px;justify-content:center}
.caldots b{width:6px;height:6px;border-radius:50%;background:var(--accent);display:block}
.caldots b.est{background:#7a5cff}
.calday.sel .caldots b{background:#fff}
.tagchip{font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.02em}
.tag-res{background:#e4f1fb;color:#2b6cb0}.tag-com{background:#efe6fb;color:#6b46c1}
#tour{position:fixed;inset:0;background:#080808;color:#fff;z-index:120;display:none;flex-direction:column;max-width:540px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 22px calc(24px + env(safe-area-inset-bottom));overflow:hidden}
#tour.on{display:flex}
#tour .skip{align-self:flex-end;color:#8a8a8a;font-size:13px;font-weight:600;padding:6px 4px}
#tour .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
#tour .emoji{font-size:84px;line-height:1;margin-bottom:22px;filter:drop-shadow(0 8px 22px rgba(232,90,0,.4));animation:pop .35s ease}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
#tour h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}#tour h2 .o{color:var(--accent)}
#tour p{font-size:16px;line-height:1.55;color:#c9cdd2;max-width:330px}#tour p b{color:#fff}
#tour .dots{display:flex;gap:7px;justify-content:center;margin:18px 0}
#tour .dot{width:8px;height:8px;border-radius:50%;background:#333;transition:.25s}
#tour .dot.on{background:var(--accent);width:22px;border-radius:5px}
#tour .ctrls{display:flex;gap:10px}#tour .ctrls .btn{flex:1}
</style>
</head>
<body>
<div id="app">
  <div class="appbar">
    <div class="wm"><span class="o">COMPLETE CARE</span> MASONRY</div>
    <div class="sp"></div>
    <span class="chip" id="clockchip" onclick="go('today')">—</span>
    <button class="chip" id="helpbtn" onclick="startTour()" style="cursor:pointer">?</button>
    <button class="rolepill" onclick="logout()"><span class="av" id="meav">?</span><span id="mename">—</span></button>
  </div>
  <div class="netbar" id="netbar"></div>
  <div class="notifbar" id="notifbar"><span onclick="enableNotify()">🔔 Turn on alerts so you don’t miss jobs &amp; messages — tap to enable</span><button onclick="dismissNotifBar()">✕</button></div>
  <div class="screen" id="screen"><div class="empty">Loading…</div></div>
  <button class="fab" id="fab" style="display:none" onclick="onFab()">＋</button>
  <div class="nav" id="nav" style="display:none">
    <button data-s="calendar" onclick="go('calendar')"><span class="ic">📅</span>Calendar</button>
    <button data-s="jobs" onclick="go('jobs')"><span class="ic">🧱</span>Jobs</button>
    <button data-s="dash" id="navdash" onclick="go('dash')" style="display:none"><span class="ic">📊</span>Dash</button>
    <button data-s="today" onclick="go('today')"><span class="ic">⏱</span>Today</button>
    <button data-s="crew" onclick="go('crew')"><span class="ic">👷</span>Crew</button>
    <button data-s="chat" onclick="go('chat')"><span class="ic">💬</span>Chat</button>
  </div>
</div>

<div id="login">
  <div class="lwm"><span class="o">COMPLETE CARE</span> MASONRY</div>
  <div class="ltag">Crew app · sign in to start your day</div>
  <div style="max-width:360px;margin:0 auto;width:100%">
    <div class="field"><label style="color:#9aa0a6">Your name</label><input id="lname" placeholder="First name" autocomplete="off" autocapitalize="words"></div>
    <div class="field"><label style="color:#9aa0a6">PIN</label><input id="lpin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter')signIn()"></div>
    <button class="btn acc" id="lbtn" onclick="signIn()">Sign in ›</button>
    <p id="lerr" style="color:#df4b3a;font-size:13px;text-align:center;margin-top:10px;display:none"></p>
  </div>
  <p class="note">First time? Enter the name &amp; PIN your admin set up for you.</p>
</div>
<div class="sheet" id="sheet" onclick="if(event.target===this)closeSheet()"><div class="sheetcard" id="sheetcard"></div></div>
<div class="toast" id="toast"></div>
<div id="tour">
  <button class="skip" onclick="endTour()">Skip ✕</button>
  <div class="body">
    <div class="emoji" id="tEmoji">👋</div>
    <h2 id="tTitle"></h2>
    <p id="tBody"></p>
  </div>
  <div class="dots" id="tDots"></div>
  <div class="ctrls">
    <button class="btn ghost" id="tBack" onclick="tourPrev()" style="display:none">‹ Back</button>
    <button class="btn acc" id="tNext" onclick="tourNext()">Next ›</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://znkozmvqunobhhsfewej.supabase.co';
const SB_KEY='sb_publishable_O1g53HbttlcHPQ2X3vmdZA_H9gj6-cH';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const emailFor=id=>id+'@ccmcrew.app';
const pwFor=id=>'CCM7k-'+id;           // password derived from stable member id (NOT pin) so PIN resets don't break login
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials=n=>(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const fmtT=t=>new Date(t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const fmtD=t=>new Date(t).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

let ME=null;
let D={jobs:[],tasks:[],comps:[],time:[],msgs:[],members:[],onb:[],crews:[],estimates:[]};
const ONB=[
 {k:'photo_id',i:'🪪',t:'Photo ID',d:'Upload a clear photo of your driver’s license or state ID (front). This confirms who you are.',a:'Upload photo ID',link:null},
 {k:'i9',i:'📋',t:'I-9 — Work Eligibility',d:'Federal law requires this for every new hire. Open the form, fill out Section 1, sign it, and upload. (Your boss completes the employer section.)',a:'Upload completed I-9',link:'https://www.uscis.gov/i-9'},
 {k:'w4_fed',i:'🇺🇸',t:'Federal Tax — W-4',d:'Sets how much federal tax comes out of your check. Open the W-4, fill it in, sign, and upload.',a:'Upload signed W-4',link:'https://www.irs.gov/forms-pubs/about-form-w-4'},
 {k:'ctw4',i:'🏛️',t:'CT State Tax — CT-W4',d:'Connecticut state tax withholding. Open Form CT-W4, fill it in, sign, and upload.',a:'Upload signed CT-W4',link:'https://portal.ct.gov/drs/drs-forms/current-year-forms/withholding-forms'},
 {k:'payroll',i:'🏦',t:'Payroll & Direct Deposit',d:'So you get paid. We run payroll through DataPay. Open the direct-deposit form, add your bank routing & account number, attach a voided check, and upload.',a:'Upload direct deposit form',link:'./direct-deposit-form.pdf'},
 {k:'osha10',i:'⛑️',t:'OSHA 10 Card',d:'You’ll need an OSHA 10 construction safety card (about $85, ~10 hours online — you cover this). Pick any OSHA-authorized provider from the official list, complete the course, then upload your card.',a:'Upload OSHA 10 card',link:'https://www.osha.gov/training/outreach/training-providers'},
];
const onbDoneCount=mid=>ONB.filter(o=>D.onb.find(x=>x.member_id===mid&&x.item===o.k)).length;
const crewName=id=>{const c=D.crews.find(x=>x.id===id);return c?c.name:'—';};
function todayStr(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function dayLabel(ds){if(!ds)return 'Not scheduled';const t=new Date(todayStr()+'T00:00:00'),d=new Date(ds+'T00:00:00');const diff=Math.round((d-t)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff===-1)return 'Yesterday';if(diff>1&&diff<7)return d.toLocaleDateString('en-US',{weekday:'long'});return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
const shortDate=ds=>ds?new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const myJobs=()=>isAdmin()?D.jobs.slice():D.jobs.filter(j=>(j.crew_id||null)===((ME&&ME.crew_id)||null));
let cur='jobs',curJob=null,dashPeriod='week',curMember=null,signedUrls={},calMonth={y:new Date().getFullYear(),m:new Date().getMonth()},calSel=todayStr(),jobFrom='jobs';
const TYPE_CHIP=t=>t==='residential'?'<span class="tagchip tag-res">🏠 Residential</span>':(t==='commercial'?'<span class="tagchip tag-com">🏢 Commercial</span>':'');
const isAdmin=()=>ME&&ME.role==='admin';

/* ---------- TOAST + GUARDS ---------- */
let toT;function toast(m,type){const t=$('toast');t.textContent=m;t.className='toast on'+(type?(' '+type):'');clearTimeout(toT);toT=setTimeout(()=>t.className='toast',2600);}
function needNet(){if(!navigator.onLine){toast('You need a connection for this','err');return false;}return true;}
const adminCount=()=>D.members.filter(m=>m.role==='admin').length;

/* ---------- CONNECTION / OUTBOX ---------- */
const OUT='ccm_outbox';
const outbox=()=>{try{return JSON.parse(localStorage.getItem(OUT)||'[]');}catch(e){return[];}};
const setOutbox=q=>localStorage.setItem(OUT,JSON.stringify(q));
function enqueue(act){const q=outbox();q.push(act);setOutbox(q);updateNet();}
function updateNet(){const b=$('netbar');if(!b)return;const off=!navigator.onLine;const n=outbox().length;
 if(off){b.textContent=n?('Offline · '+n+' change'+(n>1?'s':'')+' will sync when you reconnect'):'Offline — you can still work; changes sync later';b.classList.add('on');}
 else if(n){b.textContent='Syncing '+n+' change'+(n>1?'s':'')+'…';b.classList.add('on');}
 else b.classList.remove('on');}
async function runAct(a){const t=sb.from(a.table);
 if(a.op==='insert')return t.insert(a.payload);
 if(a.op==='update')return t.update(a.payload).eq(a.match.col,a.match.val);
 if(a.op==='delete')return t.delete().eq(a.match.col,a.match.val);}
async function flush(){let q=outbox();if(!q.length){updateNet();return;}const left=[];for(const a of q){try{const r=await runAct(a);if(r&&r.error)left.push(a);}catch(e){left.push(a);}}setOutbox(left);updateNet();if(q.length&&!left.length)toast('Synced','ok');if(navigator.onLine)loadAll();}
// mutate: run now if online; queue if offline or network drops. RLS/logic errors are surfaced, not queued.
async function mutate(act){
 if(!navigator.onLine){enqueue(act);toast('Saved offline — will sync','ok');return{queued:true};}
 try{const r=await runAct(act);if(r&&r.error){toast(r.error.message||'Save failed','err');return{error:r.error};}return{ok:true};}
 catch(e){enqueue(act);toast('Saved offline — will sync','ok');return{queued:true};}
}

/* ---------- AUTH ---------- */
async function signIn(){
 const name=$('lname').value.trim(), pin=$('lpin').value.trim();
 const err=$('lerr'),btn=$('lbtn');
 if(!name||pin.length<4){err.style.display='block';err.textContent='Enter your name and PIN (4+ digits).';return;}
 if(!navigator.onLine){err.style.display='block';err.textContent='You need a connection to sign in the first time.';return;}
 btn.disabled=true;btn.innerHTML='<span class="spin"></span>';err.style.display='none';
 try{
  const {data,error}=await sb.rpc('lookup_member',{p_name:name,p_pin:pin});
  if(error)throw error;
  const row=data&&data[0];
  if(row&&row.locked)throw new Error('Too many attempts. Wait ~10 minutes and try again.');
  if(!row||!row.member_id)throw new Error("That name + PIN isn't recognized. Ask your admin.");
  const email=emailFor(row.member_id), pw=pwFor(row.member_id);
  if(!row.claimed){
   const su=await sb.auth.signUp({email,password:pw});
   if(su.error && !/already registered/i.test(su.error.message))throw su.error;
   const si=await sb.auth.signInWithPassword({email,password:pw});
   if(si.error)throw si.error;
   await sb.rpc('claim_member',{p_member_id:row.member_id,p_pin:pin});
  }else{
   const si=await sb.auth.signInWithPassword({email,password:pw});
   if(si.error)throw new Error('Sign-in failed. Ask your admin to reset your PIN.');
  }
  await afterLogin();
 }catch(e){err.style.display='block';err.textContent=e.message||'Sign-in failed.';}
 btn.disabled=false;btn.textContent='Sign in ›';
}

async function afterLogin(){
 const {data:{session}}=await sb.auth.getSession();
 if(!session){showLogin();return;}
 if(!navigator.onLine){const m=cacheGet('ccm_me');if(m){ME=m;mountUI();restoreD();render();updateNet();return;}}
 const {data:m}=await sb.from('members').select('*').eq('auth_id',session.user.id).maybeSingle();
 if(!m){showLogin();return;}
 ME={id:m.id,name:m.name,role:m.role,crew_id:m.crew_id||null};localStorage.setItem('ccm_me',JSON.stringify(ME));
 mountUI();await loadAll();subscribe();go((!isAdmin()&&onbDoneCount(ME.id)<ONB.length)?'onboard':(isAdmin()?'jobs':'calendar'));flush();maybeTour();
}

/* ===== VOICE SCHEDULING ===== */
function isoLocal(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function offsetDate(n){const d=new Date();d.setDate(d.getDate()+n);return isoLocal(d);}
function nextWeekday(target,forceNext){const d=new Date();let diff=(target-d.getDay()+7)%7;if(diff===0)diff=7;if(forceNext)diff+=7;return offsetDate(diff);}
function parseSchedule(raw){const t=' '+raw.toLowerCase().replace(/[.,]/g,' ')+' ';const wd=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];let date=null;
 if(/\btoday\b/.test(t))date=offsetDate(0);else if(/\btomorrow\b/.test(t))date=offsetDate(1);
 else for(let i=0;i<7;i++){if(new RegExp('\\b(next\\s+)?'+wd[i]+'\\b').test(t)){date=nextWeekday(i,new RegExp('next\\s+'+wd[i]).test(t));break;}}
 const mo=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];const md=t.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{1,2})\b/);
 if(!date&&md){date=isoLocal(new Date(new Date().getFullYear(),mo.indexOf(md[1]),parseInt(md[2])));}
 const idays=t.match(/\bin\s+(\d{1,2})\s+days?\b/);if(!date&&idays)date=offsetDate(parseInt(idays[1]));
 let type=/commercial/.test(t)?'commercial':(/residential/.test(t)?'residential':null);
 let crew=null;D.crews.forEach(c=>{if(t.includes(' '+c.name.toLowerCase()+' '))crew=c.id;});
 if(!crew){const cm=t.match(/crew\s+([a-z0-9]+)/);if(cm){const f=D.crews.find(c=>c.name.toLowerCase().includes('crew '+cm[1])||c.name.toLowerCase()===('crew '+cm[1])||c.name.toLowerCase()===cm[1]);if(f)crew=f.id;}}
 let address=null;const am=t.match(/(\d{1,5}\s+[a-z0-9 ]*?\b(?:street|st|avenue|ave|road|rd|lane|ln|drive|dr|court|ct|way|boulevard|blvd|place|pl|circle|cir|terrace|ter|highway|hwy))\b/);
 if(am)address=am[1].replace(/\s+/g,' ').trim();
 let title=null;const tm=t.match(/\bschedule\s+(?:a|an|the)?\s*(.+?)(?:\s+(?:at|for|on|next|today|tomorrow|this|in)\b|$)/);
 if(tm&&tm[1])title=tm[1].trim();
 if(!title){const fm=t.match(/\b(?:a|an)\s+(.+?)(?:\s+at\b|$)/);if(fm)title=fm[1].trim();}
 const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
 const tc=s=>s?s.replace(/\b\w/g,c=>c.toUpperCase()):s;
 return {title:cap(title)||'',address:tc(address)||'',date,crew,type};
}

/* ---------- VOICE → STEPS ---------- */
function parseSteps(t){return t.replace(/\b(\d+)[\).]/g,'\n').split(/\n|(?:\.\s)|(?:,?\s*(?:and then|then|after that|next,?)\s+)/i).map(s=>s.trim().replace(/^[-•\s]+/,'')).filter(s=>s.length>2).map(s=>s.charAt(0).toUpperCase()+s.slice(1));}
let vrec=null,vlisten=false;
function voiceSteps(jid){sheet(`<h3>🎙 Talk in the steps</h3><p class="muted tiny">Describe the job out loud, start to finish. Say "next" or "then" between steps.</p><button class="btn ghost" id="micb" style="margin:12px 0" onclick="toggleVoice()">🎙 Tap to start talking</button><div class="field"><label>Steps (edit if needed)</label><textarea id="vtx" style="min-height:120px" placeholder="…or type one per line"></textarea></div><button class="btn acc" onclick="commitVoice('${jid}')">Create steps</button>`);}
function toggleVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const b=$('micb');if(!SR){b.textContent='Voice not supported here — type below';return;}if(vlisten){vrec&&vrec.stop();return;}vrec=new SR();vrec.lang='en-US';vrec.continuous=true;vrec.interimResults=true;let fin=$('vtx').value;vrec.onstart=()=>{vlisten=true;b.textContent='● Listening… tap to stop';b.style.color='var(--red)';};vrec.onend=()=>{vlisten=false;b.textContent='🎙 Tap to start talking';b.style.color='';};vrec.onresult=e=>{let it='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)fin+=t+' ';else it+=t;}if($('vtx'))$('vtx').value=fin+it;};try{vrec.start();}catch(e){}}
async function commitVoice(jid){if(vrec&&vlisten)vrec.stop();const steps=parseSteps(($('vtx')||{}).value||'');if(!steps.length){toast('Add at least one step');return;}let pos=D.tasks.filter(t=>t.job_id===jid).length;const rows=steps.map(s=>({job_id:jid,text:s,position:pos++}));closeSheet();const r=await mutate({table:'tasks',op:'insert',payload:rows});if(r.ok||r.queued){toast(steps.length+' steps added','ok');loadAll();}}

/* ---------- END-OF-DAY RECAP ---------- */
function recap(){const ts=new Date().setHours(0,0,0,0);
 const done=D.comps.filter(c=>new Date(c.done_at)>=ts);
 const flags=D.msgs.filter(m=>new Date(m.created_at)>=ts&&(m.body||'').startsWith('⚑'));
 const photos=done.filter(c=>c.photo_url).length;
 const taskText=id=>{const t=D.tasks.find(x=>x.id===id);return t?t.text:'(step)';};
 const hrs={};D.time.filter(t=>new Date(t.clock_in)>=ts).forEach(t=>{const n=memberName(t.member_id);hrs[n]=(hrs[n]||0)+((new Date(t.clock_out||Date.now())-new Date(t.clock_in))/3600000);});
 sheet(`<h3>End-of-day recap</h3><p class="muted tiny">${fmtD(Date.now())}</p>
  <div style="margin-top:12px"><b>✅ Completed (${done.length})</b>${done.length?'<div style="font-size:14px;margin-top:5px;line-height:1.7">'+done.map(c=>'• '+esc(taskText(c.task_id))+' — '+esc(memberName(c.member_id))).join('<br>')+'</div>':'<div class="muted tiny">Nothing checked off yet.</div>'}</div>
  <div style="margin-top:14px"><b style="color:var(--red)">⚑ Issues (${flags.length})</b>${flags.length?'<div style="font-size:14px;margin-top:5px;line-height:1.7;color:var(--red)">'+flags.map(f=>'• '+esc(f.body.replace('⚑ ISSUE — ',''))).join('<br>')+'</div>':'<div class="muted tiny">None flagged.</div>'}</div>
  <div style="margin-top:14px"><b>⏱ Hours</b>${Object.keys(hrs).length?'<div style="font-size:14px;margin-top:5px;line-height:1.7">'+Object.entries(hrs).map(([n,h])=>'• '+esc(n)+': '+h.toFixed(1)+'h').join('<br>')+'</div>':'<div class="muted tiny">No hours logged.</div>'}</div>
  <div style="margin-top:14px"><b>📷 Photos captured:</b> ${photos}</div>`);}

function typeSelectOpts(sel){return `<option value="">— Type —</option><option value="residential" ${sel==='residential'?'selected':''}>🏠 Residential</option><option value="commercial" ${sel==='commercial'?'selected':''}>🏢 Commercial</option>`;}
function newJob(opts){const o=(typeof opts==='string')?{date:opts}:(opts||{});const heard=!!(o.title||o.address||o.date||o.crew||o.type);
 sheet(`<h3>${o.title?'Review & create job':'New job'}</h3>${heard&&typeof opts==='object'?'<p class="muted tiny">From your voice — fix anything, then create.</p>':''}<div class="field"><label>Title</label><input id="njt" value="${esc(o.title||'')}" placeholder="e.g. Retaining Wall — 12 Oak St"></div><div class="field"><label>Address</label><input id="nja" value="${esc(o.address||'')}" placeholder="Street, town"></div><div class="field"><label>Client</label><input id="njc" placeholder="Homeowner"></div><div class="field"><label>Date</label><input type="date" id="njd" value="${o.date||todayStr()}"></div><div class="field"><label>Type</label><select id="njtype">${typeSelectOpts(o.type)}</select></div><div class="field"><label>Assign crew</label><select id="njcrew">${crewSelectOpts(o.crew||null)}</select></div><button class="btn acc" onclick="createJob()">Create job</button>`);}
async function createJob(){const t=$('njt').value.trim();if(!t){toast('Add a title');return;}const payload={title:t,address:$('nja').value.trim(),client:$('njc').value.trim(),job_date:$('njd').value||null,crew_id:$('njcrew').value||null,job_type:$('njtype').value||null};closeSheet();
 if(!navigator.onLine){enqueue({table:'jobs',op:'insert',payload});toast('Saved offline — will sync','ok');return;}
 const {data,error}=await sb.from('jobs').insert(payload).select().single();if(error){toast(error.message,'err');return;}await loadAll();if(data)openJob(data.id);}
function scheduleJob(jid){const j=D.jobs.find(x=>x.id===jid);if(!j)return;sheet(`<h3>Schedule & crew</h3><p class="muted tiny">${esc(j.title)}</p><div class="field"><label>Date</label><input type="date" id="sjd" value="${j.job_date||''}"></div><div class="field"><label>Crew</label><select id="sjcrew">${crewSelectOpts(j.crew_id)}</select></div><button class="btn acc" onclick="saveSchedule('${jid}')">Save</button>`);}
async function saveSchedule(jid){const d=$('sjd').value||null,c=$('sjcrew').value||null;closeSheet();const r=await mutate({table:'jobs',op:'update',payload:{job_date:d,crew_id:c},match:{col:'id',val:jid}});if(r.ok||r.queued){toast('Schedule updated','ok');loadAll();}}

/* ---------- TODAY / CLOCK ---------- */
function vToday(){
 const open=myOpenShift();
 const tStart=new Date().setHours(0,0,0,0);
 const mine=D.time.filter(t=>t.member_id===ME.id&&new Date(t.clock_in)>=tStart);
 const mins=mine.reduce((a,c)=>a+((new Date(c.clock_out||Date.now())-new Date(c.clock_in))/60000),0);
 let h=`<div class="h1">Today</div><div class="sub">${fmtD(Date.now())}</div>`;
 if(open){const longShift=(Date.now()-new Date(open.clock_in))>10*3600000;if(longShift)h+=`<div class="card" style="border:1.5px solid var(--amber)"><b style="color:var(--amber)">Still on the clock</b><div class="muted tiny" style="margin-top:3px">You've been clocked in over 10 hours — clock out if your shift ended.</div></div>`;}
 h+=`<div class="row" style="gap:10px;margin-bottom:14px"><div class="stat"><div class="n">${(mins/60).toFixed(1)}</div><div class="l">Your hours today</div></div></div>`;
 if(open){const j=D.jobs.find(x=>x.id===open.job_id);h+=`<div class="card" style="border:2px solid var(--green)"><div class="row"><span class="badge b-active">● On the clock</span></div><div class="muted tiny" style="margin:8px 0 12px">Since ${fmtT(open.clock_in)} · ${j?esc(j.title):''}</div><button class="btn red" onclick="clockOut()">Clock out</button></div>`;}
 else{const cj=myJobs();h+=`<div class="card"><div class="field"><label>Which job?</label><select id="cjob">${cj.map(j=>`<option value="${j.id}">${esc(j.title)}</option>`).join('')||'<option value="">No jobs for your crew</option>'}</select></div><button class="btn green" onclick="clockIn()" ${cj.length?'':'disabled'}>Clock in</button></div>`;}
 h+=`<button class="btn ghost" style="margin-top:8px" onclick="recap()">📋 End-of-day recap</button>`;
 if(isAdmin()){
  h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;color:var(--slate);margin:18px 2px 8px">Crew hours today</div>`;
  let any=false;
  D.members.forEach(m=>{const tt=D.time.filter(t=>t.member_id===m.id&&new Date(t.clock_in)>=tStart);const mn=tt.reduce((a,c)=>a+((new Date(c.clock_out||Date.now())-new Date(c.clock_in))/60000),0);const on=tt.some(t=>!t.clock_out);
   if(mn>0||on){any=true;h+=`<div class="member"><div class="av">${initials(m.name)}</div><div style="flex:1"><b>${esc(m.name)}</b><div class="muted tiny">${(mn/60).toFixed(1)}h today</div></div>${on?'<span class="badge b-active">on clock</span>':''}</div>`;}});
  if(!any)h+=`<div class="muted tiny" style="padding:4px 2px">No one clocked in yet today.</div>`;
 }
 return h;
}
function patchOutboxClockOut(memberId,iso){const q=outbox();let done=false;for(const a of q){if(a.table==='time_entries'&&a.op==='insert'&&a.payload&&a.payload.member_id===memberId&&!a.payload.clock_out){a.payload.clock_out=iso;done=true;break;}}if(done)setOutbox(q);return done;}
async function clockIn(){
 if(myOpenShift()){toast("You're already clocked in");return;}
 const sel=$('cjob');const jid=sel&&sel.value;if(!jid){toast('Pick a job');return;}
 const tmp={id:'tmp'+Date.now(),member_id:ME.id,job_id:jid,clock_in:new Date().toISOString(),clock_out:null};
 D.time.unshift(tmp);renderSafe();cacheD();
 const r=await mutate({table:'time_entries',op:'insert',payload:{member_id:ME.id,job_id:jid}});
 if(r.error){D.time=D.time.filter(x=>x.id!==tmp.id);renderSafe();}
 else if(r.ok)loadAll();           // online: replace temp with real row
 else if(r.queued)toast('Clocked in (will sync)','ok');
}
async function clockOut(){
 const o=myOpenShift();if(!o)return;const iso=new Date().toISOString();
 o.clock_out=iso;renderSafe();cacheD();
 if(String(o.id).startsWith('tmp')){patchOutboxClockOut(ME.id,iso);updateNet();toast('Clocked out (will sync)','ok');return;}
 const r=await mutate({table:'time_entries',op:'update',payload:{clock_out:iso},match:{col:'id',val:o.id}});
 if(r.error){o.clock_out=null;renderSafe();}
 else if(r.ok)loadAll();
}
function updateClock(){const o=ME&&D.time?myOpenShift():null;const c=$('clockchip');if(!c)return;if(o){c.textContent='On clock';c.classList.add('live');}else{c.textContent='Off';c.classList.remove('live');}}

/* ---------- ADMIN DASHBOARD ---------- */
function periodStartTs(p){const d=new Date();d.setHours(0,0,0,0);if(p==='today')return d.getTime();if(p==='week'){d.setDate(d.getDate()-d.getDay());return d.getTime();}return 0;}
function shiftHours(t){return (new Date(t.clock_out||Date.now())-new Date(t.clock_in))/3600000;}
function setPeriod(p){dashPeriod=p;render();}
function toggleEmp(id){const e=$('emp_'+id);if(e)e.style.display=e.style.display==='none'?'block':'none';}
function shiftRow(t){const j=D.jobs.find(x=>x.id===t.job_id);const out=t.clock_out?fmtT(t.clock_out):'<span style="color:var(--green);font-weight:700">on clock</span>';return `<div class="shift"><div><div style="font-weight:600">${fmtD(t.clock_in)}</div><div class="muted tiny">${j?esc(j.title):'—'}</div></div><div style="text-align:right"><div>${fmtT(t.clock_in)} → ${out}</div><div class="muted tiny">${shiftHours(t).toFixed(2)} h</div></div></div>`;}
function vDash(){
 const ps=periodStartTs(dashPeriod);
 const label={today:'Today',week:'This Week',all:'All Time'}[dashPeriod];
 const ents=D.time.filter(t=>new Date(t.clock_in).getTime()>=ps);
 const onclock=D.time.filter(t=>!t.clock_out).length;
 const totalH=ents.reduce((a,t)=>a+shiftHours(t),0);
 const activeJobs=D.jobs.filter(j=>(j.status||'active')==='active').length;
 const issues=D.msgs.filter(m=>new Date(m.created_at).getTime()>=ps&&(m.body||'').startsWith('⚑')).length;
 let h=`<div class="h1">Dashboard</div><div class="sub">Everything at a glance</div>`;
 h+=`<div class="seg">${['today','week','all'].map(p=>`<button class="${p===dashPeriod?'on':''}" onclick="setPeriod('${p}')">${{today:'Today',week:'This Week',all:'All Time'}[p]}</button>`).join('')}</div>`;
 h+=`<div class="row" style="gap:8px;margin-bottom:8px"><div class="stat"><div class="n">${totalH.toFixed(1)}</div><div class="l">Hours · ${esc(label)}</div></div><div class="stat"><div class="n" style="${onclock?'color:var(--green)':''}">${onclock}</div><div class="l">On the clock now</div></div></div>`;
 h+=`<div class="row" style="gap:8px;margin-bottom:16px"><div class="stat"><div class="n">${activeJobs}</div><div class="l">Active jobs</div></div><div class="stat"><div class="n" style="${issues?'color:var(--red)':''}">${issues}</div><div class="l">Issues</div></div></div>`;
 h+=`<div class="row" style="justify-content:space-between;margin:6px 2px 8px"><div style="font-weight:800;font-size:13px;text-transform:uppercase">Timesheet · ${esc(label)}</div><button class="btn ghost sm" onclick="exportTimesheet()">⬇ Export CSV</button></div>`;
 const members=D.members.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
 let grand=0,anyShift=false;
 members.forEach(m=>{
  const me=D.time.filter(t=>t.member_id===m.id&&new Date(t.clock_in).getTime()>=ps).sort((a,b)=>new Date(b.clock_in)-new Date(a.clock_in));
  const tot=me.reduce((a,t)=>a+shiftHours(t),0);grand+=tot;if(me.length)anyShift=true;
  const on=me.some(t=>!t.clock_out);
  h+=`<div class="card" style="padding:0">
   <div class="row" style="padding:13px" onclick="toggleEmp('${m.id}')"><div class="member-av" style="width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700">${initials(m.name)}</div><div style="flex:1"><b>${esc(m.name)}</b> ${on?'<span class="badge b-active">on clock</span>':''}<div class="muted tiny">${me.length} shift${me.length===1?'':'s'} · ${m.role==='admin'?'Admin':'Employee'}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:18px">${tot.toFixed(1)}h</div><div class="muted tiny">tap ›</div></div></div>
   <div id="emp_${m.id}" style="display:none;border-top:1px solid var(--line);padding:2px 13px 8px">${me.length?me.map(shiftRow).join(''):'<div class="muted tiny" style="padding:8px 0">No shifts this period.</div>'}</div>
  </div>`;
 });
 if(!anyShift)h+=`<div class="muted tiny" style="padding:2px 2px 8px">No hours logged ${esc(label.toLowerCase())} yet.</div>`;
 h+=`<div class="card" style="background:var(--slate);color:#fff"><div class="row" style="justify-content:space-between"><b>Total payroll hours · ${esc(label)}</b><b style="font-size:20px">${grand.toFixed(1)}h</b></div></div>`;
 const flags=D.msgs.filter(m=>(m.body||'').startsWith('⚑')&&new Date(m.created_at).getTime()>=ps).slice(-6).reverse();
 if(flags.length){h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;margin:16px 2px 8px;color:var(--red)">⚑ Recent issues</div>`;flags.forEach(f=>{h+=`<div class="card" style="border-left:4px solid var(--red)"><div class="tiny muted">${esc(memberName(f.member_id))} · ${fmtD(f.created_at)} · ${fmtT(f.created_at)}</div>${esc(f.body.replace('⚑ ISSUE — ',''))}</div>`;});}
 // employee files & onboarding
 h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;margin:16px 2px 4px">Employee files</div><div class="muted tiny" style="margin:0 2px 8px">Tap a name to see all their forms, documents & hours.</div>`;
 const crew=D.members.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
 crew.forEach(m=>{const dc=onbDoneCount(m.id);const full=dc===ONB.length;
  h+=`<div class="member tap" onclick="openEmpFile('${m.id}')"><div class="av">${initials(m.name)}</div><div style="flex:1"><b>${esc(m.name)}</b><div class="muted tiny">${m.role==='admin'?'Admin':'Employee'} · ${dc}/${ONB.length} documents</div></div><div style="font-weight:800;font-size:13px;color:${full?'var(--green)':'var(--mut)'}">${full?'✓ complete':dc+'/'+ONB.length} ›</div></div>`;});
 const jobs=D.jobs.slice(0,6);
 if(jobs.length){h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;margin:16px 2px 8px">Jobs progress</div>`;jobs.forEach(j=>{const p=jobProg(j.id);h+=`<div class="card tap" onclick="openJob('${j.id}')"><div class="row" style="justify-content:space-between"><b>${esc(j.title)}</b><span class="muted tiny">${p}%</span></div><div class="prog"><i style="width:${p}%"></i></div></div>`;});}
 return h;
}
function exportTimesheet(){const ps=periodStartTs(dashPeriod);
 const ents=D.time.filter(t=>new Date(t.clock_in).getTime()>=ps).sort((a,b)=>new Date(a.clock_in)-new Date(b.clock_in));
 const q=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';
 const rows=[['Employee','Date','Clock In','Clock Out','Job','Hours']];
 ents.forEach(t=>{const j=D.jobs.find(x=>x.id===t.job_id);rows.push([memberName(t.member_id),fmtD(t.clock_in),fmtT(t.clock_in),t.clock_out?fmtT(t.clock_out):'(still on clock)',j?j.title:'',shiftHours(t).toFixed(2)]);});
 const tot={};ents.forEach(t=>{const n=memberName(t.member_id);tot[n]=(tot[n]||0)+shiftHours(t);});
 rows.push([]);rows.push(['TOTALS — '+dashPeriod,'','','','','']);
 Object.entries(tot).forEach(([n,hh])=>rows.push([n,'','','','',hh.toFixed(2)]));
 const csv=rows.map(r=>r.map(q).join(',')).join('\n');
 try{const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='timesheet-'+dashPeriod+'-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);toast('Timesheet exported','ok');}
 catch(e){toast('Export not supported here','err');}
}

/* ---------- ADMIN: fix/add shifts (payroll) ---------- */
function toLocalInput(d){if(!d)return '';const dt=new Date(d);return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,16);}
function editShift(id){const t=D.time.find(x=>x.id===id);if(!t)return;if(String(id).startsWith('tmp')){toast('This shift is still syncing — try again in a moment');return;}
 const jobOpts=D.jobs.map(j=>`<option value="${j.id}" ${j.id===t.job_id?'selected':''}>${esc(j.title)}</option>`).join('');
 sheet(`<h3>Edit shift</h3><p class="muted tiny">${esc(memberName(t.member_id))}</p>
  <div class="field"><label>Job</label><select id="sfjob">${jobOpts||'<option value="">—</option>'}</select></div>
  <div class="field"><label>Clock in</label><input type="datetime-local" id="sfin" value="${toLocalInput(t.clock_in)}"></div>
  <div class="field"><label>Clock out</label><input type="datetime-local" id="sfout" value="${toLocalInput(t.clock_out)}"></div>
  <button class="btn acc" onclick="saveShift('${id}')">Save</button>
  <button class="btn red" style="margin-top:8px" onclick="delShift('${id}')">Delete shift</button>`);}
async function saveShift(id){const inV=$('sfin').value,outV=$('sfout').value;if(!inV){toast('Set a clock-in time','err');return;}
 const ci=new Date(inV).toISOString(),co=outV?new Date(outV).toISOString():null;
 if(co&&new Date(co)<new Date(ci)){toast('Clock-out is before clock-in','err');return;}
 if(!needNet())return;closeSheet();const {error}=await sb.from('time_entries').update({job_id:$('sfjob').value||null,clock_in:ci,clock_out:co}).eq('id',id);
 if(error){toast(error.message,'err');return;}toast('Shift updated','ok');loadAll();}
async function delShift(id){if(!confirm('Delete this shift? This removes its hours.'))return;if(!needNet())return;closeSheet();const {error}=await sb.from('time_entries').delete().eq('id',id);if(error){toast(error.message,'err');return;}toast('Shift deleted','ok');loadAll();}
function addShift(mid){const jobOpts=D.jobs.map(j=>`<option value="${j.id}">${esc(j.title)}</option>`).join('');const now=toLocalInput(new Date().toISOString());
 sheet(`<h3>Add shift</h3><p class="muted tiny">Manually log hours for ${esc(memberName(mid))}.</p>
  <div class="field"><label>Job</label><select id="asjob">${jobOpts||'<option value="">—</option>'}</select></div>
  <div class="field"><label>Clock in</label><input type="datetime-local" id="asin" value="${now}"></div>
  <div class="field"><label>Clock out</label><input type="datetime-local" id="asout" value="${now}"></div>
  <button class="btn acc" onclick="saveAddShift('${mid}')">Add shift</button>`);}
async function saveAddShift(mid){const inV=$('asin').value,outV=$('asout').value;if(!inV||!outV){toast('Set both times','err');return;}
 if(new Date(outV)<new Date(inV)){toast('Clock-out is before clock-in','err');return;}
 if(!needNet())return;closeSheet();const {error}=await sb.from('time_entries').insert({member_id:mid,job_id:$('asjob').value||null,clock_in:new Date(inV).toISOString(),clock_out:new Date(outV).toISOString()});
 if(error){toast(error.message,'err');return;}toast('Shift added','ok');loadAll();}

 if(!admin){
  let h=`<div class="h1">My Crew</div><div class="sub">${ME.crew_id?esc(crewName(ME.crew_id)):'Not on a crew yet'}</div>`;
  const mates=D.members.filter(m=>(m.crew_id||null)===((ME&&ME.crew_id)||null));
  mates.forEach(m=>{h+=`<div class="member"><div class="av">${initials(m.name)}</div><div style="flex:1"><b>${esc(m.name)}</b><div class="muted tiny">${m.role==='admin'?'Admin':'Employee'}</div></div>${m.id===ME.id?'<span class="badge b-soon">you</span>':''}</div>`;});
  return h;
 }
 let h=`<div class="h1">Crew</div><div class="sub">${D.members.length} people · ${D.crews.length} crew${D.crews.length===1?'':'s'}</div>`;
 h+=`<div class="row" style="gap:8px;margin-bottom:8px"><button class="btn ghost sm" style="flex:1" onclick="newCrew()">＋ New crew</button><button class="btn ghost sm" style="flex:1" onclick="newMember()">＋ Add person</button></div>`;
 h+=`<button class="btn ghost sm" style="width:100%;margin-bottom:6px" onclick="moveCrewSheet()">🔀 Move people between crews</button>`;
 const groups=D.crews.map(c=>({id:c.id,name:c.name})).concat([{id:null,name:'Unassigned'}]);
 groups.forEach(g=>{const mem=D.members.filter(m=>(m.crew_id||null)===g.id);
  if(g.id===null&&!mem.length)return;
  h+=`<div class="row" style="justify-content:space-between;margin:14px 2px 8px"><span style="font-weight:800;font-size:13px;text-transform:uppercase">${esc(g.name)} <span class="muted" style="font-weight:600">· ${mem.length}</span></span><span style="display:flex;gap:12px">${g.id?`<button class="tiny" style="color:var(--accent);font-weight:700" onclick="addToCrew('${g.id}')">＋ add</button><button class="tiny muted" style="text-decoration:underline" onclick="editCrew('${g.id}')">edit</button>`:''}</span></div>`;
  if(!mem.length)h+=`<div class="muted tiny" style="padding:0 2px 6px">No one here yet. Tap ＋ add to move someone onto this crew.</div>`;
  mem.forEach(m=>{h+=`<div class="member"><div class="av">${initials(m.name)}</div><div style="flex:1;min-width:0" onclick="openEmpFile('${m.id}')"><b>${esc(m.name)}</b><div class="muted tiny">${m.role==='admin'?'Admin':'Employee'} · ${onbDoneCount(m.id)}/${ONB.length} docs</div></div>${m.id===ME.id?'<span class="badge b-soon">you</span>':''}<button class="btn ghost sm" style="padding:7px 10px" onclick="movePerson('${m.id}')">Move ▾</button></div>`;});
 });
 return h;
}
function addToCrew(crewId){const c=D.crews.find(x=>x.id===crewId);if(!c)return;const avail=D.members.filter(m=>(m.crew_id||null)!==crewId);
 let h=`<h3>Add to ${esc(c.name)}</h3><p class="muted tiny">Tap a person to move them onto this crew.</p>`;
 if(!avail.length)h+=`<div class="muted tiny" style="padding:10px 0">Everyone is already on this crew.</div>`;
 avail.forEach(m=>{h+=`<div class="member tap" onclick="moveToCrew('${m.id}','${crewId}')"><div class="av">${initials(m.name)}</div><div style="flex:1;min-width:0"><b>${esc(m.name)}</b><div class="muted tiny">${m.crew_id?'On '+esc(crewName(m.crew_id)):'Unassigned'}</div></div><span style="color:var(--accent);font-weight:800">＋</span></div>`;});
 sheet(h);
}
function movePerson(id){const m=D.members.find(x=>x.id===id);if(!m)return;
 let h=`<h3>Move ${esc(m.name)}</h3><p class="muted tiny">Pick a crew.</p>`;
 h+=`<div class="member tap" onclick="moveToCrew('${id}','')"><div style="flex:1"><b>Unassigned</b></div>${!m.crew_id?'<span class="badge b-active">current</span>':''}</div>`;
 D.crews.forEach(c=>{h+=`<div class="member tap" onclick="moveToCrew('${id}','${c.id}')"><div style="flex:1"><b>${esc(c.name)}</b></div>${m.crew_id===c.id?'<span class="badge b-active">current</span>':''}</div>`;});
 sheet(h);
}
async function moveToCrew(id,crewId){if(!needNet())return;const {error}=await sb.from('members').update({crew_id:crewId||null}).eq('id',id);if(error){toast(error.message,'err');return;}closeSheet();toast('Moved'+(crewId?' to '+crewName(crewId):' to Unassigned'),'ok');loadAll();}
function moveCrewSheet(){
 let h=`<h3>Move people between crews</h3><p class="muted tiny">Change anyone’s crew right here.</p>`;
 if(!D.crews.length)h+=`<div class="card" style="background:#fff8ee;border-color:var(--amber)"><b style="color:var(--amber)">Make a crew first</b><div class="muted tiny">Tap “＋ New crew” to create one, then move people in.</div></div>`;
 D.members.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(m=>{
  h+=`<div class="row" style="gap:10px;margin:10px 0"><div class="av" style="width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px">${initials(m.name)}</div><div style="flex:1;min-width:0"><b style="font-size:14px">${esc(m.name)}</b></div><select onchange="assignMemberCrew('${m.id}',this.value)" style="width:48%;border:1.5px solid var(--line2);border-radius:9px;padding:9px;font-size:14px">${crewSelectOpts(m.crew_id)}</select></div>`;});
 sheet(h);
}
function newCrew(){sheet(`<h3>New crew</h3><div class="field"><label>Crew name</label><input id="cn" placeholder="e.g. Crew A · Mike’s Crew · East Team"></div><button class="btn acc" onclick="saveCrew()">Create crew</button>`);}
async function saveCrew(){const n=$('cn').value.trim();if(!n){toast('Name the crew','err');return;}if(!needNet())return;closeSheet();const {error}=await sb.from('crews').insert({name:n});if(error){toast(/duplicate/i.test(error.message)?'That crew name is taken.':error.message,'err');return;}toast('Crew created','ok');loadAll();}
function editCrew(id){const c=D.crews.find(x=>x.id===id);if(!c)return;const count=D.members.filter(m=>m.crew_id===id).length;sheet(`<h3>Edit crew</h3><div class="field"><label>Crew name</label><input id="ecn" value="${esc(c.name)}"></div><button class="btn acc" onclick="renameCrew('${id}')">Save name</button><button class="btn red" style="margin-top:8px" onclick="deleteCrew('${id}','${esc(c.name)}')">Delete crew</button><p class="muted tiny" style="text-align:center;margin-top:8px">Deleting keeps people & jobs — they just become Unassigned (${count} on this crew).</p>`);}
async function renameCrew(id){const n=$('ecn').value.trim();if(!n){toast('Name required','err');return;}if(!needNet())return;closeSheet();const {error}=await sb.from('crews').update({name:n}).eq('id',id);if(error){toast(error.message,'err');return;}toast('Crew renamed','ok');loadAll();}
async function deleteCrew(id,name){if(!confirm('Delete crew "'+name+'"? People & jobs on it become Unassigned.'))return;if(!needNet())return;closeSheet();const {error}=await sb.from('crews').delete().eq('id',id);if(error){toast(error.message,'err');return;}toast('Crew deleted','ok');loadAll();}
function newMember(){sheet(`<h3>Add crew member</h3><div class="field"><label>Name (their login)</label><input id="mn" placeholder="First name"></div><div class="field"><label>PIN (4–6 digits)</label><input id="mp" type="tel" inputmode="numeric" maxlength="6" placeholder="e.g. 4821"></div><div class="field"><label>Role</label><select id="mr"><option value="employee">Employee</option><option value="admin">Admin</option></select></div><div class="field"><label>Crew</label><select id="mcrew">${crewSelectOpts(null)}</select></div><button class="btn acc" onclick="addMember()">Add to crew</button><p class="muted tiny" style="text-align:center;margin-top:10px">They sign in with this name + PIN. Names must be unique.</p>`);}
async function addMember(){const n=$('mn').value.trim(),p=$('mp').value.trim(),role=$('mr').value,crew=$('mcrew').value||null;if(!n||p.length<4){toast('Name and 4-digit PIN required','err');return;}if(!/^[0-9]+$/.test(p)){toast('PIN must be numbers only','err');return;}if(!needNet())return;closeSheet();const {error}=await sb.from('members').insert({name:n,pin:p,role,crew_id:crew});if(error){toast(/duplicate/i.test(error.message)?'That name is taken — use a different one.':error.message,'err');return;}toast('Added '+n,'ok');loadAll();}
function manageMember(id){const m=D.members.find(x=>x.id===id);if(!m)return;sheet(`<h3>${esc(m.name)}</h3><p class="muted tiny">${m.role==='admin'?'Admin':'Employee'}</p>
 <div class="field" style="margin-top:14px"><label>Crew</label><select id="mmcrew" onchange="assignMemberCrew('${id}',this.value)">${crewSelectOpts(m.crew_id)}</select></div>
 <div class="field"><label>Reset PIN</label><input id="rpin" type="tel" inputmode="numeric" maxlength="6" placeholder="New 4–6 digit PIN"></div>
 <button class="btn acc" onclick="resetPin('${id}')">Save new PIN</button>
 <button class="btn ghost" style="margin-top:8px" onclick="toggleRole('${id}','${m.role}')">Make ${m.role==='admin'?'Employee':'Admin'}</button>
 <button class="btn red" style="margin-top:8px" onclick="removeMember('${id}','${esc(m.name)}')">Remove from crew</button>`);}
async function assignMemberCrew(id,crewId){if(!needNet())return;const {error}=await sb.from('members').update({crew_id:crewId||null}).eq('id',id);if(error){toast(error.message,'err');return;}toast('Crew updated','ok');loadAll();}
async function resetPin(id){const p=$('rpin').value.trim();if(p.length<4){toast('PIN must be 4+ digits','err');return;}if(!needNet())return;closeSheet();const {error}=await sb.from('members').update({pin:p}).eq('id',id);if(error){toast(error.message,'err');return;}toast('PIN updated','ok');loadAll();}
async function toggleRole(id,role){if(role==='admin'&&adminCount()<=1){toast('Keep at least one admin on the account','err');return;}const nr=role==='admin'?'employee':'admin';if(!needNet())return;closeSheet();const {error}=await sb.from('members').update({role:nr}).eq('id',id);if(error){toast(error.message,'err');return;}toast('Role updated','ok');loadAll();}
async function removeMember(id,name){const m=D.members.find(x=>x.id===id);if(m&&m.role==='admin'&&adminCount()<=1){toast("Can't remove the only admin","err");return;}if(!confirm('Remove '+name+' from the crew? They will no longer be able to sign in.'))return;if(!needNet())return;closeSheet();const {error}=await sb.from('members').delete().eq('id',id);if(error){toast(error.message,'err');return;}toast('Removed '+name,'ok');loadAll();}

/* ---------- CHAT ---------- */
function vChat(){
 let h=`<div class="h1">Messages</div><div class="sub">Company crew chat</div><div style="padding-bottom:60px">`;
 D.msgs.filter(m=>!m.job_id).forEach(m=>{h+=`<div class="msg ${m.member_id===ME.id?'me':'them'} ${String(m.id).startsWith('tmp')?'pending':''}"><div class="who">${esc(memberName(m.member_id))}</div>${esc(m.body)}<div class="tm">${fmtT(m.created_at)}</div></div>`;});
 h+=`</div>`;
 setTimeout(()=>{if(!$('cbar')){const b=document.createElement('div');b.className='chatbar';b.id='cbar';const inp=document.createElement('input');inp.id='gmsg';inp.placeholder='Message everyone…';inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendGen();});const bt=document.createElement('button');bt.textContent='➤';bt.onclick=sendGen;b.appendChild(inp);b.appendChild(bt);$('app').appendChild(b);}},10);
 return h;
}
async function sendGen(){const i=$('gmsg');if(!i)return;const v=i.value.trim();if(!v)return;i.value='';
 const tmp={id:'tmp'+Date.now(),member_id:ME.id,body:v,created_at:new Date().toISOString()};D.msgs.push(tmp);renderSafe();scrollChatBottom();
 const r=await mutate({table:'messages',op:'insert',payload:{member_id:ME.id,body:v}});
 if(r.error){D.msgs=D.msgs.filter(x=>x.id!==tmp.id);renderSafe();}else if(r.ok)loadAll();}
function clearChatbar(){const b=$('cbar');if(b)b.remove();}

/* ---------- SHEET / FAB / IMG ---------- */
function sheet(html){$('sheetcard').innerHTML=html+`<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>`;$('sheet').classList.add('on');}
function closeSheet(){$('sheet').classList.remove('on');}
function onFab(){if(cur==='jobs')newJob();else if(cur==='crew')newMember();}
function resizeImg(file,cb){const max=1024;
 const draw=src=>{const cv=document.createElement('canvas');const sc=Math.min(1,max/Math.max(src.width,src.height));cv.width=Math.round(src.width*sc);cv.height=Math.round(src.height*sc);cv.getContext('2d').drawImage(src,0,0,cv.width,cv.height);cv.toBlob(cb,'image/jpeg',.72);};
 if('createImageBitmap'in window){createImageBitmap(file,{imageOrientation:'from-image'}).then(draw).catch(()=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>draw(img);img.src=e.target.result;};r.readAsDataURL(file);});}
 else{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>draw(img);img.src=e.target.result;};r.readAsDataURL(file);}
}

/* ---------- WELCOME TOUR ---------- */
const TOUR=[
 {e:'👋',t:'Welcome to the crew!',b:'This app keeps your workday simple. Take 30 seconds to swipe through — you’ll have it down by the end.'},
 {e:'🧱',t:'Your jobs',b:'Tap <b>Jobs</b>, then tap a job to open its checklist. Every step is just one thing to get done.'},
 {e:'✅',t:'Check it off',b:'Tap the circle next to a step when it’s done. Some steps show a <b>📷 photo</b> tag — your camera opens so you can snap proof. Easy.'},
 {e:'⏱',t:'Clock in & out',b:'Open <b>Today</b>. Hit <b>Clock in</b> when you reach the site and <b>Clock out</b> when you leave. Your hours add up automatically.'},
 {e:'⚑',t:'Hit a snag?',b:'Tap <b>Flag issue</b> on any step to tell the boss right away — ran out of block, hit roots, anything. They see it instantly.'},
 {e:'💬',t:'Stay in touch',b:'Use <b>Messages</b> for the whole crew, or chat right inside a job. Keep it quick and simple.'},
 {e:'📶',t:'No signal? No problem',b:'Working in a basement or a dead zone? Keep going — the app saves your work and syncs the moment you’re back online.'},
 {e:'🚀',t:'You’re all set!',b:'That’s the whole app. Tap below and have a great day out there. (Need a refresher? Tap <b>?</b> up top anytime.)'},
];
let tIdx=0;
function startTour(){tIdx=0;tourPaint();$('tour').classList.add('on');}
function endTour(){$('tour').classList.remove('on');if(ME)try{localStorage.setItem('ccm_tour_'+ME.id,'1');}catch(e){}}
function tourPaint(){const c=TOUR[tIdx];$('tEmoji').textContent=c.e;$('tEmoji').style.animation='none';void $('tEmoji').offsetWidth;$('tEmoji').style.animation='';$('tTitle').innerHTML=c.t;$('tBody').innerHTML=c.b;
 $('tDots').innerHTML=TOUR.map((_,i)=>`<span class="dot ${i===tIdx?'on':''}"></span>`).join('');
 $('tBack').style.display=tIdx>0?'flex':'none';
 $('tNext').textContent=tIdx===TOUR.length-1?'Get started 🚀':'Next ›';}
function tourNext(){if(tIdx>=TOUR.length-1){endTour();return;}tIdx++;tourPaint();}
function tourPrev(){if(tIdx>0){tIdx--;tourPaint();}}
function maybeTour(){if(ME&&!localStorage.getItem('ccm_tour_'+ME.id))setTimeout(startTour,450);}
(function(){const t=$('tour');if(!t)return;let x0=null;t.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});t.addEventListener('touchend',e=>{if(x0==null)return;const dx=e.changedTouches[0].clientX-x0;if(dx<-45)tourNext();else if(dx>45)tourPrev();x0=null;},{passive:true});})();

/* ---------- BOOT ---------- */
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
// keep data fresh when the app is reopened / phone wakes / regains connection
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&ME&&navigator.onLine){flush();loadAll({preserve:true});}});
window.addEventListener('focus',()=>{if(ME&&navigator.onLine)loadAll({preserve:true});});
updateNet();
(async function(){
 try{const {data:{session}}=await sb.auth.getSession();if(session){await afterLogin();}else{showLogin();}}
 catch(e){const m=cacheGet('ccm_me');if(m&&!navigator.onLine){ME=m;mountUI();restoreD();render();}else showLogin();}
})();
</script>
