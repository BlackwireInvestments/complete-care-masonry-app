<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Complete Care Masonry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--slate:#0d0d0d;--slate2:#1f1f1f;--bg:#eef0f2;--card:#fff;--line:#e0e3e7;--line2:#cdd2d8;
 --txt:#15171a;--mut:#6b7178;--mut2:#9aa0a6;--accent:#e85a00;--green:#1aa863;--greenbg:#e4f6ec;--amber:#e0871f;--red:#df4b3a;--redbg:#fbe6e3;
 --rad:14px;--sh:0 2px 10px rgba(20,33,46,.06)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{max-width:540px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
.muted{color:var(--mut)}.tiny{font-size:12px}
/* appbar */
.appbar{background:var(--slate);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:20}
.wm{font-weight:800;font-size:15px;letter-spacing:.01em}.wm .o{color:var(--accent)}
.appbar .sp{flex:1}
.chip{font-size:11px;font-weight:700;padding:5px 9px;border-radius:99px;background:#2a2a2a;color:#fff}
.chip.live{background:var(--green)}
.rolepill{display:flex;align-items:center;gap:7px;background:var(--slate2);border-radius:99px;padding:6px 10px 6px 7px;font-size:12px;font-weight:600}
.rolepill .av{width:24px;height:24px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:11px;font-weight:700}
.screen{flex:1;overflow-y:auto;padding:14px 14px 90px;-webkit-overflow-scrolling:touch}
.h1{font-size:22px;font-weight:800;letter-spacing:-.02em}.sub{color:var(--mut);font-size:13px;margin-bottom:14px}
.row{display:flex;align-items:center;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--sh);margin-bottom:12px;padding:15px}
.card:active{transform:scale(.997)}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase}
.b-active{background:var(--greenbg);color:#137a47}.b-soon{background:#e8eef5;color:#3a566f}
.prog{height:8px;background:#eef1f4;border-radius:99px;overflow:hidden;margin:11px 0 8px}.prog i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:.4s}
.jt{font-size:17px;font-weight:700}.jad{color:var(--mut);font-size:13px;margin-top:2px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:12px;font-weight:700;font-size:15px;background:var(--slate);color:#fff;transition:.15s}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.btn.acc{background:var(--accent)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.ghost{background:#fff;color:var(--txt);border:1.5px solid var(--line2)}
.btn.sm{padding:10px 14px;font-size:13px;width:auto}
.fab{position:absolute;right:16px;bottom:78px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;display:grid;place-items:center;box-shadow:0 6px 20px rgba(232,90,0,.4);z-index:25}
.nav{position:absolute;left:0;right:0;bottom:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:flex;z-index:24;max-width:540px;margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--mut2);font-size:10.5px;font-weight:600}
.nav button.on{color:var(--accent)}.nav .ic{font-size:22px;line-height:1}
.step{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start}
.step.done{background:#f6faf7;border-color:#cfe9da}
.chk{width:28px;height:28px;border-radius:8px;border:2px solid var(--line2);flex:0 0 28px;display:grid;place-items:center;font-size:16px;color:#fff}
.step.done .chk{background:var(--green);border-color:var(--green)}
.step .tx{font-size:15px;font-weight:500;line-height:1.35}.step.done .tx{color:var(--mut);text-decoration:line-through}
.step .meta{font-size:11.5px;color:var(--mut);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.reqp{font-size:10px;font-weight:700;color:var(--accent);background:#fbe6db;padding:2px 7px;border-radius:6px}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);margin-top:8px}
.msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.4;margin-bottom:9px}
.msg .who{font-size:11px;font-weight:700;margin-bottom:2px;color:var(--accent)}
.msg.me{background:var(--slate);color:#fff;margin-left:auto;border-bottom-right-radius:4px}.msg.me .who{color:#f4a06a}
.msg.them{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg .tm{font-size:10px;color:var(--mut2);margin-top:3px}
.chatbar{position:absolute;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));max-width:540px;margin:0 auto;display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--line)}
.chatbar input{flex:1;border:1px solid var(--line2);border-radius:22px;padding:11px 15px}
.chatbar button{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;flex:0 0 44px}
.member{display:flex;align-items:center;gap:12px;padding:13px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:9px}
.member .av{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;flex:1}.stat .n{font-size:26px;font-weight:800}.stat .l{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;margin-top:2px}
.empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px}
.field{margin:12px 0}.field label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line2);border-radius:11px;padding:13px}
.sheet{position:fixed;inset:0;background:rgba(13,13,13,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
.sheet.on{display:flex}
.sheetcard{background:#fff;width:100%;max-width:540px;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.sheetcard h3{font-size:19px;font-weight:800;margin-bottom:4px}
/* login */
#login{position:fixed;inset:0;background:#080808;color:#fff;z-index:80;display:none;flex-direction:column;justify-content:center;padding:30px 24px calc(30px + env(safe-area-inset-bottom));max-width:540px;margin:0 auto;overflow-y:auto}
#login.on{display:flex}
#login .lwm{font-weight:800;font-size:24px;text-align:center}.lwm .o{color:var(--accent)}
#login .ltag{text-align:center;color:#9aa0a6;font-size:13px;margin:6px 0 26px}
#login .field input{background:#151515;border:1.5px solid #2a2a2a;color:#fff}
#login .note{text-align:center;color:#6a6a6a;font-size:12px;margin-top:18px;line-height:1.5}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="appbar">
    <div class="wm"><span class="o">COMPLETE CARE</span> MASONRY</div>
    <div class="sp"></div>
    <span class="chip" id="clockchip" onclick="go('today')">—</span>
    <button class="rolepill" onclick="logout()"><span class="av" id="meav">?</span><span id="mename">—</span></button>
  </div>
  <div class="screen" id="screen"><div class="empty">Loading…</div></div>
  <button class="fab" id="fab" style="display:none" onclick="onFab()">＋</button>
  <div class="nav" id="nav" style="display:none">
    <button data-s="jobs" onclick="go('jobs')"><span class="ic">🧱</span>Jobs</button>
    <button data-s="today" onclick="go('today')"><span class="ic">⏱</span>Today</button>
    <button data-s="crew" onclick="go('crew')"><span class="ic">👷</span>Crew</button>
    <button data-s="chat" onclick="go('chat')"><span class="ic">💬</span>Messages</button>
  </div>
</div>

<div id="login">
  <div class="lwm"><span class="o">COMPLETE CARE</span> MASONRY</div>
  <div class="ltag">Crew app · sign in</div>
  <div style="max-width:360px;margin:0 auto;width:100%">
    <div class="field"><label style="color:#9aa0a6">Your name</label><input id="lname" placeholder="e.g. Russ" autocomplete="off"></div>
    <div class="field"><label style="color:#9aa0a6">4-digit PIN</label><input id="lpin" type="tel" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter')signIn()"></div>
    <button class="btn acc" id="lbtn" onclick="signIn()">Sign in ›</button>
    <p id="lerr" style="color:#df4b3a;font-size:13px;text-align:center;margin-top:10px;display:none"></p>
  </div>
  <p class="note">First time? Just enter the name &amp; PIN your admin set for you.<br>Admin demo — name <b style="color:#fff">Russ</b>, PIN <b style="color:#fff">1234</b></p>
</div>
<div class="sheet" id="sheet" onclick="if(event.target===this)closeSheet()"><div class="sheetcard" id="sheetcard"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://znkozmvqunobhhsfewej.supabase.co';
const SB_KEY='sb_publishable_O1g53HbttlcHPQ2X3vmdZA_H9gj6-cH';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const emailFor=id=>id+'@ccmcrew.app';
const pwFor=pin=>'CCM-'+pin;
const $=id=>document.getElementById(id);
const initials=n=>(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const fmtT=t=>new Date(t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const fmtD=t=>new Date(t).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

let ME=null;           // {id,name,role}
let D={jobs:[],tasks:[],comps:[],time:[],msgs:[],members:[]};
let cur='jobs',curJob=null;
const isAdmin=()=>ME&&ME.role==='admin';

/* ---------- AUTH ---------- */
async function signIn(){
 const name=$('lname').value.trim(), pin=$('lpin').value.trim();
 const err=$('lerr'),btn=$('lbtn');
 if(!name||pin.length<4){err.style.display='block';err.textContent='Enter your name and 4-digit PIN.';return;}
 btn.disabled=true;btn.innerHTML='<span class="spin"></span>';err.style.display='none';
 try{
  const {data,error}=await sb.rpc('lookup_member',{p_name:name,p_pin:pin});
  if(error)throw error;
  const row=data&&data[0];
  if(!row){throw new Error("That name + PIN isn't recognized. Ask your admin.");}
  const email=emailFor(row.member_id), pw=pwFor(pin);
  if(!row.claimed){
   const su=await sb.auth.signUp({email,password:pw});
   if(su.error && !/already registered/i.test(su.error.message))throw su.error;
   const si=await sb.auth.signInWithPassword({email,password:pw});
   if(si.error)throw si.error;
   await sb.rpc('claim_member',{p_member_id:row.member_id,p_pin:pin});
  }else{
   const si=await sb.auth.signInWithPassword({email,password:pw});
   if(si.error)throw new Error('Wrong PIN.');
  }
  await afterLogin();
 }catch(e){err.style.display='block';err.textContent=e.message||'Sign-in failed.';}
 btn.disabled=false;btn.textContent='Sign in ›';
}
async function afterLogin(){
 const {data:{session}}=await sb.auth.getSession();
 if(!session){showLogin();return;}
 const {data:m}=await sb.from('members').select('*').eq('auth_id',session.user.id).maybeSingle();
 if(!m){showLogin();return;}
 ME={id:m.id,name:m.name,role:m.role};
 $('login').classList.remove('on');$('nav').style.display='flex';
 $('mename').textContent=ME.name;$('meav').textContent=initials(ME.name);
 await loadAll();subscribe();go('jobs');
}
function showLogin(){$('login').classList.add('on');$('nav').style.display='none';$('fab').style.display='none';}
async function logout(){await sb.auth.signOut();ME=null;$('lname').value='';$('lpin').value='';showLogin();}

/* ---------- DATA ---------- */
async function loadAll(){
 const [jobs,tasks,comps,time,msgs,members]=await Promise.all([
  sb.from('jobs').select('*').order('created_at',{ascending:false}),
  sb.from('tasks').select('*').order('position'),
  sb.from('task_completions').select('*'),
  sb.from('time_entries').select('*').order('clock_in',{ascending:false}),
  sb.from('messages').select('*').order('created_at'),
  sb.from('members').select('id,name,role'),
 ]);
 D={jobs:jobs.data||[],tasks:tasks.data||[],comps:comps.data||[],time:time.data||[],msgs:msgs.data||[],members:members.data||[]};
 render();updateClock();
}
let subbed=false;
function subscribe(){if(subbed)return;subbed=true;
 sb.channel('ccm').on('postgres_changes',{event:'*',schema:'public'},()=>{loadAll();}).subscribe();}
const memberName=id=>{const m=D.members.find(x=>x.id===id);return m?m.name:'—';};
const compFor=tid=>D.comps.find(c=>c.task_id===tid);
const myOpenShift=()=>D.time.find(t=>t.member_id===ME.id&&!t.clock_out);

/* ---------- ROUTER ---------- */
function go(s){cur=s;curJob=null;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));render();$('screen').scrollTop=0;}
function openJob(id){cur='job';curJob=id;render();}
function render(){
 if(!ME)return;
 $('fab').style.display=((cur==='jobs'||cur==='crew')&&isAdmin())?'grid':'none';
 const el=$('screen');
 if(cur==='jobs')el.innerHTML=vJobs();
 else if(cur==='job')el.innerHTML=vJob(curJob);
 else if(cur==='today')el.innerHTML=vToday();
 else if(cur==='crew')el.innerHTML=vCrew();
 else if(cur==='chat'){el.innerHTML=vChat();setTimeout(()=>{const c=$('screen');c.scrollTop=c.scrollHeight;},30);}
 updateClock();
}
function jobProg(jid){const ts=D.tasks.filter(t=>t.job_id===jid);if(!ts.length)return 0;const done=ts.filter(t=>compFor(t.id)).length;return Math.round(done/ts.length*100);}

/* ---------- JOBS ---------- */
function vJobs(){
 let h=`<div class="h1">${isAdmin()?'Jobs':'My Jobs'}</div><div class="sub">${D.jobs.length} job${D.jobs.length===1?'':'s'} · tap to see the steps</div>`;
 if(!isAdmin()&&!myOpenShift()&&D.jobs.length)h+=`<div class="card" style="border:1.5px solid var(--accent)"><div class="row"><div style="flex:1"><b>Start your day</b><div class="muted tiny">Clock in when you reach the site.</div></div><button class="btn green sm" onclick="go('today')">Clock in</button></div>`;
 if(!D.jobs.length)h+=`<div class="empty">${isAdmin()?'No jobs yet. Tap ＋ to add one.':'No jobs assigned yet.'}</div>`;
 D.jobs.forEach(j=>{const p=jobProg(j.id);
  h+=`<div class="card" onclick="openJob('${j.id}')"><div class="row"><div style="flex:1"><div class="jt">${j.title}</div><div class="jad">${j.address||''}</div></div><span class="badge b-active">${j.status||'active'}</span></div><div class="prog"><i style="width:${p}%"></i></div><div class="muted tiny">${p}% complete · ${D.tasks.filter(t=>t.job_id===j.id).length} steps</div></div>`;});
 return h;
}
/* ---------- JOB DETAIL ---------- */
function vJob(jid){
 const j=D.jobs.find(x=>x.id===jid);if(!j)return '<div class="empty">Job not found.</div>';
 const ts=D.tasks.filter(t=>t.job_id===jid),p=jobProg(jid);
 let h=`<button class="btn ghost sm" style="margin-bottom:10px" onclick="go('jobs')">‹ All jobs</button><div class="h1">${j.title}</div><div class="sub">${j.address||''} ${j.client?'· '+j.client:''}</div>
 <div class="card"><div class="row" style="justify-content:space-between"><b>${p}% complete</b><span class="muted tiny">${ts.length} steps</span></div><div class="prog"><i style="width:${p}%"></i></div></div>`;
 if(isAdmin())h+=`<button class="btn acc sm" style="margin-bottom:12px" onclick="addTask('${jid}')">＋ Add step</button>`;
 if(!ts.length)h+=`<div class="empty">No steps yet.${isAdmin()?' Add the checklist.':''}</div>`;
 ts.forEach(t=>{const c=compFor(t.id);
  h+=`<div class="step ${c?'done':''}"><div class="chk" onclick="toggleTask('${t.id}',${t.require_photo})">${c?'✓':''}</div><div style="flex:1;min-width:0"><div class="tx">${t.text}</div><div class="meta">${t.require_photo?'<span class="reqp">📷 photo</span>':''}${c?`<span>✓ ${memberName(c.member_id)} · ${fmtT(c.done_at)}</span>`:''}</div>${c&&c.photo_url?`<img class="thumb" src="${c.photo_url}">`:''}</div></div>`;});
 // job chat
 h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;color:var(--slate);margin:14px 2px 8px">Job chat</div>`;
 D.msgs.filter(m=>m.job_id===jid).slice(-6).forEach(m=>{h+=`<div class="msg ${m.member_id===ME.id?'me':'them'}"><div class="who">${memberName(m.member_id)}</div>${m.body}<div class="tm">${fmtT(m.created_at)}</div></div>`;});
 h+=`<div class="row" style="gap:8px;margin-top:8px"><input id="jmsg" placeholder="Message the crew…" style="flex:1;border:1px solid var(--line2);border-radius:22px;padding:11px 15px" onkeydown="if(event.key==='Enter')sendMsg('${jid}')"><button class="btn acc" style="width:46px;height:46px;border-radius:50%;flex:0 0 46px" onclick="sendMsg('${jid}')">➤</button></div>`;
 return h;
}
async function toggleTask(tid,reqPhoto){
 const c=compFor(tid);
 if(c){ if(isAdmin()){await sb.from('task_completions').delete().eq('id',c.id);loadAll();} return; }
 if(reqPhoto){return completeWithPhoto(tid);}
 await sb.from('task_completions').insert({task_id:tid,member_id:ME.id});loadAll();
}
function completeWithPhoto(tid){
 const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';
 inp.onchange=e=>{const f=e.target.files[0];if(!f)return;resizeImg(f,async blob=>{
   const path=ME.id+'/'+tid+'-'+Date.now()+'.jpg';
   const up=await sb.storage.from('task-photos').upload(path,blob,{contentType:'image/jpeg'});
   let url=null; if(!up.error){url=sb.storage.from('task-photos').getPublicUrl(path).data.publicUrl;}
   await sb.from('task_completions').insert({task_id:tid,member_id:ME.id,photo_url:url});loadAll();
 });};
 inp.click();
}
function addTask(jid){sheet(`<h3>Add step</h3><div class="field"><label>Step</label><input id="ts" placeholder="e.g. Compact base, 4&quot; stone"></div><label class="row" style="gap:8px;font-weight:600"><input type="checkbox" id="trq" style="width:20px;height:20px"> Require a photo to check off</label><button class="btn acc" style="margin-top:14px" onclick="saveTask('${jid}')">Add step</button>`);}
async function saveTask(jid){const t=$('ts').value.trim();if(!t)return;const pos=D.tasks.filter(x=>x.job_id===jid).length;await sb.from('tasks').insert({job_id:jid,text:t,require_photo:$('trq').checked,position:pos});closeSheet();loadAll();}
async function sendMsg(jid){const i=$('jmsg');const v=i.value.trim();if(!v)return;i.value='';await sb.from('messages').insert({member_id:ME.id,job_id:jid,body:v});loadAll();}

/* ---------- NEW JOB ---------- */
function newJob(){sheet(`<h3>New job</h3><div class="field"><label>Title</label><input id="njt" placeholder="e.g. Retaining Wall — 12 Oak St"></div><div class="field"><label>Address</label><input id="nja" placeholder="Street, town"></div><div class="field"><label>Client</label><input id="njc" placeholder="Homeowner"></div><button class="btn acc" onclick="createJob()">Create job</button>`);}
async function createJob(){const t=$('njt').value.trim();if(!t)return;const {data}=await sb.from('jobs').insert({title:t,address:$('nja').value.trim(),client:$('njc').value.trim()}).select().single();closeSheet();await loadAll();if(data)openJob(data.id);}

/* ---------- TODAY / CLOCK ---------- */
function vToday(){
 const open=myOpenShift();
 const tStart=new Date().setHours(0,0,0,0);
 const mine=D.time.filter(t=>t.member_id===ME.id&&new Date(t.clock_in)>=tStart);
 const mins=mine.reduce((a,c)=>a+((new Date(c.clock_out||Date.now())-new Date(c.clock_in))/60000),0);
 let h=`<div class="h1">Today</div><div class="sub">${fmtD(Date.now())}</div>
 <div class="row" style="gap:10px;margin-bottom:14px"><div class="stat"><div class="n">${(mins/60).toFixed(1)}</div><div class="l">Your hours today</div></div></div>`;
 if(open){const j=D.jobs.find(x=>x.id===open.job_id);h+=`<div class="card" style="border:2px solid var(--green)"><div class="row"><span class="badge b-active">● On the clock</span></div><div class="muted tiny" style="margin:8px 0 12px">Since ${fmtT(open.clock_in)} · ${j?j.title:''}</div><button class="btn red" onclick="clockOut()">Clock out</button></div>`;}
 else{h+=`<div class="card"><div class="field"><label>Which job?</label><select id="cjob">${D.jobs.map(j=>`<option value="${j.id}">${j.title}</option>`).join('')||'<option value="">No jobs</option>'}</select></div><button class="btn green" onclick="clockIn()">Clock in</button></div>`;}
 if(isAdmin()){
  h+=`<div style="font-weight:800;font-size:13px;text-transform:uppercase;color:var(--slate);margin:18px 2px 8px">Crew hours today</div>`;
  D.members.forEach(m=>{const ts=D.time.filter(t=>t.member_id===m.id&&new Date(t.clock_in)>=tStart);const mn=ts.reduce((a,c)=>a+((new Date(c.clock_out||Date.now())-new Date(c.clock_in))/60000),0);const on=ts.some(t=>!t.clock_out);
   if(mn>0||on)h+=`<div class="member"><div class="av">${initials(m.name)}</div><div style="flex:1"><b>${m.name}</b><div class="muted tiny">${(mn/60).toFixed(1)}h today</div></div>${on?'<span class="badge b-active">on clock</span>':''}</div>`;});
 }
 return h;
}
async function clockIn(){const jid=$('cjob').value;if(!jid)return;await sb.from('time_entries').insert({member_id:ME.id,job_id:jid});loadAll();}
async function clockOut(){const o=myOpenShift();if(o){await sb.from('time_entries').update({clock_out:new Date().toISOString()}).eq('id',o.id);}loadAll();}
function updateClock(){const o=ME&&D.time?myOpenShift():null;const c=$('clockchip');if(!c)return;if(o){c.textContent='On clock';c.classList.add('live');}else{c.textContent='Off';c.classList.remove('live');}}

/* ---------- CREW ---------- */
function vCrew(){
 let h=`<div class="h1">Crew</div><div class="sub">${D.members.length} people${isAdmin()?' · tap ＋ to add':''}</div>`;
 D.members.forEach(m=>{h+=`<div class="member"><div class="av">${initials(m.name)}</div><div style="flex:1"><b>${m.name}</b><div class="muted tiny">${m.role==='admin'?'Admin':'Employee'}</div></div>${m.id===ME.id?'<span class="badge b-soon">you</span>':''}</div>`;});
 return h;
}
function newMember(){sheet(`<h3>Add crew member</h3><div class="field"><label>Name (their login)</label><input id="mn" placeholder="First name"></div><div class="field"><label>4-digit PIN (their login)</label><input id="mp" type="tel" inputmode="numeric" maxlength="6" placeholder="e.g. 1234"></div><div class="field"><label>Role</label><select id="mr"><option value="employee">Employee</option><option value="admin">Admin</option></select></div><button class="btn acc" onclick="addMember()">Add to crew</button><p class="muted tiny" style="text-align:center;margin-top:10px">They sign in with this name + PIN. Names must be unique.</p>`);}
async function addMember(){const n=$('mn').value.trim(),p=$('mp').value.trim();if(!n||p.length<4){alert('Name and 4-digit PIN required.');return;}
 const {error}=await sb.from('members').insert({name:n,pin:p,role:$('mr').value});
 if(error){alert(error.message.includes('duplicate')?'That name is taken — use a different one.':error.message);return;}
 closeSheet();loadAll();}

/* ---------- CHAT ---------- */
function vChat(){
 let h=`<div class="h1">Messages</div><div class="sub">Company crew chat</div><div style="padding-bottom:60px">`;
 D.msgs.filter(m=>!m.job_id).forEach(m=>{h+=`<div class="msg ${m.member_id===ME.id?'me':'them'}"><div class="who">${memberName(m.member_id)}</div>${m.body}<div class="tm">${fmtT(m.created_at)}</div></div>`;});
 h+=`</div>`;
 // chatbar appended outside scroll
 setTimeout(()=>{if(!$('cbar')){const b=document.createElement('div');b.className='chatbar';b.id='cbar';const inp=document.createElement('input');inp.id='gmsg';inp.placeholder='Message everyone…';inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendGen();});const bt=document.createElement('button');bt.textContent='➤';bt.onclick=sendGen;b.appendChild(inp);b.appendChild(bt);$('app').appendChild(b);}},10);
 return h;
}
async function sendGen(){const i=$('gmsg');const v=i.value.trim();if(!v)return;i.value='';await sb.from('messages').insert({member_id:ME.id,body:v});loadAll();}
function clearChatbar(){const b=$('cbar');if(b)b.remove();}

/* ---------- SHEET / FAB ---------- */
function sheet(html){$('sheetcard').innerHTML=html+`<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>`;$('sheet').classList.add('on');}
function closeSheet(){$('sheet').classList.remove('on');}
function onFab(){if(cur==='jobs')newJob();else if(cur==='crew')newMember();}
function resizeImg(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=720,sc=Math.min(1,max/Math.max(img.width,img.height));const cv=document.createElement('canvas');cv.width=img.width*sc;cv.height=img.height*sc;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cv.toBlob(cb,'image/jpeg',.7);};img.src=e.target.result;};r.readAsDataURL(file);}

/* remove chatbar when leaving chat */
const _go=go;go=function(s){if(cur==='chat'&&s!=='chat')clearChatbar();_go(s);};

/* ---------- BOOT ---------- */
(async function(){
 const {data:{session}}=await sb.auth.getSession();
 if(session){await afterLogin();}else{showLogin();}
})();
</script>
</body>
</html>
